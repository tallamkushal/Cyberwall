<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: linear-gradient(135deg, #0f0f0e 0%, #111827 100%);
  color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  height: 100vh;
  display: flex;
  flex-direction: column;
  padding: 14px 16px;
  gap: 10px;
}
.header {
  display: flex;
  align-items: center;
  gap: 6px;
}
.logo { font-size: 18px; line-height: 1; }
.app-name {
  font-size: 11px;
  font-weight: 600;
  color: rgba(255,255,255,0.45);
  letter-spacing: 0.5px;
  text-transform: uppercase;
}
.status-row {
  display: flex;
  align-items: center;
  gap: 8px;
}
.dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
  animation: pulse 2s infinite;
}
.dot.green { background: #10b981; box-shadow: 0 0 6px rgba(16,185,129,0.6); }
.dot.red   { background: #ef4444; box-shadow: 0 0 6px rgba(239,68,68,0.6); animation: none; }
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}
.status-text { font-size: 15px; font-weight: 700; }
.divider { height: 1px; background: rgba(255,255,255,0.08); }
.stat-row {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.stat-label {
  font-size: 10px;
  color: rgba(255,255,255,0.4);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.stat-value {
  font-size: 36px;
  font-weight: 800;
  line-height: 1.1;
  color: #fff;
}
.stat-sub { font-size: 10px; color: rgba(255,255,255,0.3); margin-top: 3px; }
.footer {
  font-size: 9px;
  color: rgba(255,255,255,0.22);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
</style>
</head>
<body>
  <div class="header">
    <span class="logo">🛡</span>
    <span class="app-name">ProCyberWall</span>
  </div>

  <div class="status-row">
    <div class="dot {{dot_class}}"></div>
    <span class="status-text">{{status_text}}</span>
  </div>

  <div class="divider"></div>

  <div class="stat-row">
    <div class="stat-label">Attacks blocked</div>
    <div class="stat-value">{{attacks_blocked}}</div>
    <div class="stat-sub">last 30 days · {{domain}}</div>
  </div>

  <div class="footer">
    <span>Updated {{updated_at}}</span>
    <span>Tap to open →</span>
  </div>
</body>
</html>

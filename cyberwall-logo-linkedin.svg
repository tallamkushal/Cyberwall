<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a47e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f2fa8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dce8ff;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0a1f6b" flood-opacity="0.4"/>
    </filter>
    <filter id="shieldShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0a1f6b" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" rx="80" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.06" stroke="white" stroke-width="1">
    <line x1="0" y1="80" x2="400" y2="80"/>
    <line x1="0" y1="160" x2="400" y2="160"/>
    <line x1="0" y1="240" x2="400" y2="240"/>
    <line x1="0" y1="320" x2="400" y2="320"/>
    <line x1="80" y1="0" x2="80" y2="400"/>
    <line x1="160" y1="0" x2="160" y2="400"/>
    <line x1="240" y1="0" x2="240" y2="400"/>
    <line x1="320" y1="0" x2="320" y2="400"/>
  </g>

  <!-- Glow circle behind shield -->
  <circle cx="200" cy="185" r="110" fill="white" opacity="0.06"/>

  <!-- Shield shape -->
  <path d="M200 68 L296 108 L296 210 Q296 298 200 348 Q104 298 104 210 L104 108 Z"
        fill="url(#shieldGrad)"
        filter="url(#shieldShadow)"/>

  <!-- Shield inner border accent -->
  <path d="M200 82 L284 118 L284 208 Q284 286 200 332 Q116 286 116 208 L116 118 Z"
        fill="none"
        stroke="rgba(26,71,232,0.15)"
        stroke-width="2"/>

  <!-- Checkmark -->
  <path d="M158 198 L188 228 L244 168"
        stroke="#1a47e8"
        stroke-width="22"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"/>

  <!-- Bottom text -->
  <text x="200" y="382"
        font-family="'Arial', 'Helvetica', sans-serif"
        font-weight="800"
        font-size="28"
        fill="white"
        text-anchor="middle"
        opacity="0.9"
        letter-spacing="3">CYBERWALL</text>
</svg>
